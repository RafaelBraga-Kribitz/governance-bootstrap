id: F-COVERAGE-GAP
title: "Test line coverage below the project-defined threshold"
category: coverage_regression
kind: recurrence_invariant
status: open
opened_at: "{PROJECT_START_DATE}"
closed_at: null
recurrence_count: 0
evidence: |
  scripts/check_test_coverage.py reports GAP — either no coverage data exists
  (.coverage / coverage.xml absent) or measured line coverage is below
  quality_gates.coverage.min_lines in config/quality_gates.yaml.
  Run `make audit` to see the current percentage.
verification_script: scripts/check_test_coverage.py
notes: |
  Closure approach:
    1. Ensure pytest --cov runs and generates .coverage or coverage.xml.
    2. Set quality_gates.coverage.min_lines in config/quality_gates.yaml.
    3. Register the value in config/parameter_registry.yaml (owner + rationale).
    4. Run `python scripts/check_test_coverage.py`.
       Expected: [PASS] check_test_coverage.py: F-COVERAGE-GAP clean
    5. Update status to closed, set closed_at.

  Mid-flight: run `make baseline` first to discover the current coverage %,
  then set min_lines at or below that value to get CI green immediately.
  File a separate finding each time you raise the threshold.

  If this project has no Python src: set status: wont_fix with
  wont_fix_reason: "No Python source — metric does not apply."
