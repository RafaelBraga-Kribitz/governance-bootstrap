id: F-COMPLEXITY-VIOLATION
title: "Function cyclomatic complexity exceeds the project threshold"
category: complexity_violation
kind: recurrence_invariant
status: open
opened_at: "{PROJECT_START_DATE}"
closed_at: null
recurrence_count: 0
evidence: |
  scripts/check_complexity.py reports GAP — one or more functions in
  src/ or scripts/ have a cyclomatic complexity score above
  quality_gates.complexity.max_per_function in config/quality_gates.yaml.
  Run `make audit` to see violating functions.
verification_script: scripts/check_complexity.py
notes: |
  Closure approach:
    1. Run `python scripts/check_complexity.py` to list violating functions.
    2. Refactor each: extract sub-functions, flatten conditionals, simplify logic.
    3. Or raise the threshold in quality_gates.yaml if the complexity is
       genuinely justified — document the rationale in parameter_registry.yaml.
    4. Run `python scripts/check_complexity.py`.
       Expected: [PASS] check_complexity.py: F-COMPLEXITY-VIOLATION clean
    5. Update status to closed, set closed_at.

  Uncle Bob recommends cyclomatic complexity ≤ 7. Default threshold is 6,
  giving one unit of headroom before the gate fires.

  Mid-flight: run `make baseline` to discover the current worst-case score,
  then set max_per_function at or above that value to get CI green immediately.

  If this project has no Python src: set status: wont_fix.
