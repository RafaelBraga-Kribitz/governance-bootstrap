id: F-DEPENDENCY-VIOLATION
title: "Module imports violate architectural dependency rules"
category: dependency_violation
kind: recurrence_invariant
status: open
opened_at: "{PROJECT_START_DATE}"
closed_at: null
recurrence_count: 0
evidence: |
  scripts/check_dependency_structure.py reports GAP — .importlinter is missing
  (no dependency contracts defined) or lint-imports found contract violations.
  Run `make audit` to see the current status.
verification_script: scripts/check_dependency_structure.py
notes: |
  Closure approach:
    1. Install import-linter: pip install import-linter.
    2. Create .importlinter at repo root defining your dependency contracts.
       Example (Clean Architecture):
         [importlinter]
         root_packages = src
         [importlinter:contract:domain-independence]
         name = Domain layer must not import infrastructure
         type = forbidden
         source_modules = src.domain
         forbidden_modules = src.infrastructure
    3. Run lint-imports to verify contracts pass with exit 0.
    4. Run `python scripts/check_dependency_structure.py`.
       Expected: [PASS] check_dependency_structure.py: F-DEPENDENCY-VIOLATION clean
    5. Update status to closed, set closed_at.

  Mid-flight: run `make baseline` to get setup instructions and a starting
  .importlinter example. Start with the most critical boundary and add
  contracts incrementally — one PR per contract.

  If this project has no layered architecture or explicit module boundaries:
  set status: wont_fix with wont_fix_reason explaining the decision.
