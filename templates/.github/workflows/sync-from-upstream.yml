name: Sync governance kit from upstream

# Pulls updates to the governance kit from the upstream hub repo
# (governance-bootstrap) into governance/_kit/ and opens a PR.
#
# Triggers:
#   - repository_dispatch: governance-update (fired by hub on release)
#   - schedule: nightly safety net (in case a dispatch was missed)
#   - workflow_dispatch: manual sync from a specific ref
#
# Requires repo secret GOV_SYNC_TOKEN (PAT with contents:write +
# pull_requests:write on this consumer repo).

on:
  repository_dispatch:
    types: [governance-update]
  schedule:
    - cron: '17 5 * * *'   # 05:17 UTC daily
  workflow_dispatch:
    inputs:
      ref:
        description: 'Upstream ref (tag / branch / SHA)'
        default: 'main'
        required: false

env:
  UPSTREAM_REPO: RafaelBraga-Kribitz/governance-bootstrap
  KIT_PREFIX: governance/_kit

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GOV_SYNC_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "governance-sync-bot"
          git config user.email "governance-sync-bot@users.noreply.github.com"

      - name: Resolve ref
        id: ref
        run: |
          REF="${{ github.event.client_payload.ref || inputs.ref || 'main' }}"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Create sync branch
        id: branch
        run: |
          STAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH="governance-sync/${{ steps.ref.outputs.ref }}-${STAMP}"
          # sanitize slashes in ref
          BRANCH=$(echo "$BRANCH" | tr '/' '-')
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Subtree pull (or add)
        id: pull
        env:
          REF: ${{ steps.ref.outputs.ref }}
        run: |
          BEFORE=$(git rev-parse HEAD)
          if git ls-tree -d HEAD "$KIT_PREFIX" >/dev/null 2>&1; then
            git subtree pull \
              --prefix="$KIT_PREFIX" \
              "https://github.com/${UPSTREAM_REPO}.git" "$REF" \
              --squash \
              -m "chore(governance): sync kit from ${UPSTREAM_REPO}@${REF}"
          else
            echo "kit not vendored yet — running subtree add"
            git subtree add \
              --prefix="$KIT_PREFIX" \
              "https://github.com/${UPSTREAM_REPO}.git" "$REF" \
              --squash
          fi
          AFTER=$(git rev-parse HEAD)
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push and open PR
        if: steps.pull.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GOV_SYNC_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.name }}
          REF: ${{ steps.ref.outputs.ref }}
        run: |
          git push -u origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Governance kit sync: ${UPSTREAM_REPO}@${REF}" \
            --body "Automated sync from [${UPSTREAM_REPO}](https://github.com/${UPSTREAM_REPO}) at \`${REF}\`.

          Review the diff under \`${KIT_PREFIX}/\`. If \`make audit\` still passes after merge, the kit is in sync.

          _Generated by \`.github/workflows/sync-from-upstream.yml\`._"

      - name: Report no-op
        if: steps.pull.outputs.changed != 'true'
        run: echo "✓ already up-to-date with ${UPSTREAM_REPO}@${{ steps.ref.outputs.ref }}"
