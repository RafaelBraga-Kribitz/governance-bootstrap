# config/modeling.yaml — ML / statistical modelling parameters
# Every value here must also have an entry in config/parameter_registry.yaml.

train_test_split:
  test_size: 0.2
  stratify: true

cross_validation:
  n_splits: 5

significance_level: 0.05
confidence_level: 0.95
bootstrap_samples: 1000

